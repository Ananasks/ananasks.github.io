<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar__top">
      <div class="profile-image" aria-hidden="true">
        <span>AN</span>
      </div>

      <div class="profile-copy">
        <p class="profile-name">{{ copy().shell.name }}</p>
        <p class="profile-role">{{ copy().shell.role }}</p>
      </div>
    </div>

    <nav class="menu" aria-label="Primary">
      @for (item of navItems; track item.route) {
        <a
          class="menu__link"
          [routerLink]="item.route"
          routerLinkActive="menu__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          {{ copy().shell.nav[item.key] }}
        </a>
      }
    </nav>

    <div class="sidebar__bottom">
      <a class="resume-link" href="/resume-placeholder.pdf" download>
        {{ copy().shell.resumeLabel }}
      </a>

      <div class="language-switcher">
        <span class="language-switcher__label">{{ copy().shell.languageLabel }}</span>
        <div class="language-switcher__actions">
          @for (language of languages; track language) {
            <button
              type="button"
              class="language-button"
              [class.language-button--active]="language === currentLanguage()"
              (click)="setLanguage(language)"
            >
              {{ language.toUpperCase() }}
            </button>
          }
        </div>
      </div>
    </div>
  </aside>

  <main class="page-frame">
    <router-outlet />
  </main>
</div>
