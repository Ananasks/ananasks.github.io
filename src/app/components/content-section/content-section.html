<section class="content-section">
  <h2>{{ section().heading }}</h2>

  @for (paragraph of section().paragraphs; track paragraph) {
    <p>{{ paragraph }}</p>
  }

  @if (section().items?.length) {
    <ul>
      @for (item of section().items; track item) {
        <li>{{ item }}</li>
      }
    </ul>
  }
</section>
